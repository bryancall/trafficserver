#
# Test filter_body plugin adding header to client response on pattern match.
#
meta:
  version: "1.0"

autest:
  description: 'Verify filter_body adds header to client response when pattern matches'

  server:
    name: 'filter-server-resp-header'

  client:
    name: 'filter-client-resp-header'

  ats:
    name: 'ts-filter-resp-header'
    process_config:
      enable_cache: false

    copy_to_config_dir:
      - config/filter_body_response_header.yaml

    records_config:
      proxy.config.diags.debug.enabled: 1
      proxy.config.diags.debug.tags: 'filter_body'

    remap_config:
      - from: /
        to: http://127.0.0.1:{SERVER_HTTP_PORT}/
        plugins:
          - name: "filter_body.so"
            args:
              - "filter_body_response_header.yaml"

    log_validation:
      diags_log:
        contains:
          - expression: "Matched rule: sensitive_response"
            description: "Verify that the sensitive_response rule matched"

sessions:
  - transactions:
      # Request that gets response with sensitive data - header should be added
      - client-request:
          method: "GET"
          version: "1.1"
          url: /api/data
          headers:
            fields:
              - [Host, www.example.com]
              - [uuid, resp-header-test]

        proxy-request:
          method: "GET"
          url: /api/data

        server-response:
          status: 200
          reason: OK
          headers:
            fields:
              - [Content-Type, "application/json"]
              - [Content-Length, 25]
          content:
            data: '{"data": "secret_data"}'

        proxy-response:
          status: 200


