# Configuration for adding header on match
rules:
  - name: "xxe_add_header"
    direction: request
    action:
      - log
      - add_header:
          X-Security-Match: "<rule_name>"
    methods: [POST]
    headers:
      - name: "Content-Type"
        patterns:
          - "application/xml"
    body_patterns:
      - "<!ENTITY"
