# Configuration for response body filtering.
rules:
  - name: "sensitive_data_leak"
    filter:
      direction: response
      status: [200]
      headers:
        - name: "Content-Type"
          patterns:
            - "application/json"
            - "text/html"
      body_patterns:
        - "SSN:"
        - "password:"
    action: [log]
