# Configuration for response body filtering with add_header action
rules:
  - name: "sensitive_response"
    direction: response
    action:
      - log
      - add_header:
          X-Data-Classification: "sensitive"
          X-Rule-Name: "<rule_name>"
    status: [200]
    headers:
      - name: "Content-Type"
        patterns:
          - "application/json"
    body_patterns:
      - "secret_data"
